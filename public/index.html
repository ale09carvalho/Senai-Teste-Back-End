<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriVitta — Calculadora IMC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app-wrapper">
    <div class="phone">
      <!-- Tela 1: Boas-vindas -->
      <section id="tela-boas-vindas" class="tela tela-ativa tela-welcome">
        <div class="welcome-content">
          <h1 class="titulo-imc">IMC</h1>
          <h2 class="subtitulo">Calculadora</h2>
          <p class="descricao">
            Bem-vindo à Calculadora de IMC da <strong>NutriVitta</strong>, sua ferramenta para
            acompanhar o Índice de Massa Corporal e monitorar sua saúde nutricional.
          </p>
        </div>
        <button type="button" class="btn-primario" id="btn-start">START</button>
      </section>

      <!-- Tela 2: Entrada de dados -->
      <section id="tela-formulario" class="tela tela-form">
        <header class="header-app">
          <button type="button" class="icon-btn" aria-label="Menu">☰</button>
          <span class="header-titulo" id="saudacao">Olá!</span>
          <button type="button" class="icon-btn" aria-label="Notificações">🔔</button>
        </header>

        <form id="form-imc" class="formulario">
          <div class="campo-nome">
            <label for="nome">Seu nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required />
          </div>

          <div class="genero-grupo">
            <div class="avatars">
              <div class="avatar masculino" title="Masculino">👨</div>
              <div class="avatar feminino" title="Feminino">👩</div>
            </div>
            <div class="genero-toggle">
              <button type="button" class="genero-btn" data-genero="masculino">Masculino</button>
              <button type="button" class="genero-btn" data-genero="feminino">Feminino</button>
            </div>
            <input type="hidden" id="genero" name="genero" value="" />
          </div>

          <div class="campo-card">
            <label for="idade">Idade</label>
            <input type="number" id="idade" name="idade" min="1" max="120" placeholder="Ex: 25" required />
          </div>

          <div class="campo-card campo-com-unidade">
            <label for="peso">Peso</label>
            <div class="input-unidade">
              <input type="number" id="peso" name="peso" min="1" step="0.1" placeholder="Ex: 70" required />
              <select id="unidadePeso" name="unidadePeso">
                <option value="kg" selected>Kg</option>
                <option value="lb">Lb</option>
              </select>
            </div>
          </div>

          <div class="campo-card campo-com-unidade">
            <label for="altura">Altura</label>
            <div class="input-unidade">
              <input type="number" id="altura" name="altura" min="1" step="0.1" placeholder="Ex: 165" required />
              <select id="unidadeAltura" name="unidadeAltura">
                <option value="cm" selected>Cm</option>
                <option value="m">M</option>
                <option value="in">In</option>
              </select>
            </div>
          </div>

          <p id="erro-form" class="erro-msg" hidden></p>

          <button type="submit" class="btn-primario" id="btn-calcular">Calcule seu IMC</button>
        </form>
      </section>

      <!-- Tela 3: Resultado -->
      <section id="tela-resultado" class="tela tela-result">
        <header class="header-app">
          <button type="button" class="icon-btn" id="btn-voltar" aria-label="Voltar">←</button>
          <span class="header-titulo">Seu resultado de IMC</span>
          <button type="button" class="icon-btn" aria-label="Notificações">🔔</button>
        </header>

        <div class="resultado-conteudo">
          <div class="imc-ring">
            <svg viewBox="0 0 120 120">
              <circle class="ring-bg" cx="60" cy="60" r="52" />
              <circle class="ring-progress" id="ring-progress" cx="60" cy="60" r="52" />
            </svg>
            <div class="imc-valor" id="imc-valor">--</div>
          </div>

          <p class="resultado-mensagem" id="resultado-mensagem">—</p>

          <div class="resumo-dados" id="resumo-dados"></div>

          <ul class="tabela-classificacao" id="tabela-classificacao"></ul>

          <p class="peso-ideal" id="peso-ideal"></p>
        </div>

        <nav class="nav-inferior">
          <button type="button" class="nav-item ativo">🏠</button>
          <button type="button" class="nav-item">🎯</button>
          <button type="button" class="nav-item nav-add" id="btn-novo-calculo">+</button>
          <button type="button" class="nav-item">📊</button>
          <button type="button" class="nav-item">👤</button>
        </nav>
      </section>
    </div>

    <p class="marca-empresa">NutriVitta — Atendimento clínico em nutrição</p>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
